<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビューティフルステート Basic ストレスデトックス</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #ffffff; }
  .wrap { max-width: 700px; margin: 0 auto; }
  .wrap img { display: block; width: 100%; height: auto; }
  .cta-area {
    text-align: center;
    padding: 28px 20px 56px;
    background: #FBF7F0;
  }
  .cta-btn {
    display: inline-block;
    width: 100%;
    max-width: 340px;
    padding: 18px 0;
    background: #6B4A32;
    color: #ffffff;
    font-size: 16px;
    letter-spacing: 0.1em;
    border-radius: 40px;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(107,74,50,0.25);
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
  }
  .cta-note {
    font-size: 12px;
    color: #A8886B;
    margin-top: 14px;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
  }
</style>
</head>
<body>
<div class="wrap">
  <img src="bsdetox-assets/slice-00.jpg" alt="">
  <img src="bsdetox-assets/slice-01.jpg" alt="">
  <img src="bsdetox-assets/slice-02.jpg" alt="">
  <img src="bsdetox-assets/slice-03.jpg" alt="">
  <img src="bsdetox-assets/slice-04.jpg" alt="">
  <img src="bsdetox-assets/slice-05.jpg" alt="">
  <img src="bsdetox-assets/slice-06.jpg" alt="">
  <img src="bsdetox-assets/slice-07.jpg" alt="">
  <img src="bsdetox-assets/slice-08.jpg" alt="">
  <img src="bsdetox-assets/slice-09.jpg" alt="">
  <img src="bsdetox-assets/slice-10.jpg" alt="">
  <img src="bsdetox-assets/slice-11.jpg" alt="">
  <img src="bsdetox-assets/slice-12.jpg" alt="">
  <img src="bsdetox-assets/slice-13.jpg" alt="">
  <img src="bsdetox-assets/slice-14.jpg" alt="">
  <img src="bsdetox-assets/slice-15.jpg" alt="">

  <div class="cta-area">
    <a id="cta-btn" class="cta-btn" href="https://line.me/R/ti/p/@051yxgkh">LINEで友だち追加する</a>
    <div class="cta-note" id="cta-note">お申し込みには公式LINEの友だち登録が必要です</div>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var friendId = params.get('friend_id');
  var btn = document.getElementById('cta-btn');
  var note = document.getElementById('cta-note');
  if (friendId) {
    var formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSctCfGKOPn27_lITlwGpXU2BeHJH0FKy9tvBhPFBRCAWbM_fg/viewform?usp=pp_url&entry.591261612=' + encodeURIComponent(friendId);
    btn.href = formUrl;
    btn.textContent = '今すぐお申し込みする';
    note.textContent = '';
  }
})();
</script>

</body>
</html>
